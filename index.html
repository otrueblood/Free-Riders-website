<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Free Riders</title>
  <meta name="description" content="The Free Riders — live rock and country done right." />
  <style>
    :root {
      --cream: #fcf9f1;
      --paper: #fffdf8;
      --ink: #2a2118;
      --muted: #6f5f4f;
      --line: rgba(42, 33, 24, 0.12);
      --accent: #9b6b43;
      --shadow: 0 24px 60px rgba(44, 31, 18, 0.09);
      --radius: 28px;
      --max: 1120px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(155,107,67,.08), transparent 30%),
        radial-gradient(circle at bottom right, rgba(42,33,24,.05), transparent 28%),
        linear-gradient(180deg, var(--cream) 0%, var(--paper) 100%);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.04;
      mix-blend-mode: multiply;
      background-image:
        linear-gradient(rgba(0,0,0,.7) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,.7) 1px, transparent 1px);
      background-size: 3px 3px;
      z-index: 0;
    }

    a { color: inherit; text-decoration: none; }
    img, video { display: block; max-width: 100%; }

    .wrap {
      position: relative;
      z-index: 1;
      width: min(calc(100% - 32px), var(--max));
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 22px 0;
      gap: 16px;
    }

    .brandmark {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      font-family: Arial, Helvetica, sans-serif;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-size: 0.78rem;
      color: var(--muted);
    }

    .brandmark .logo {
      width: 62px;
      height: 62px;
      object-fit: contain;
      border-radius: 999px;
      background: rgba(255,255,255,.72);
      border: 1px solid var(--line);
      box-shadow: 0 10px 24px rgba(44,31,18,.08);
    }

    .nav {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 0.82rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .nav a {
      padding-bottom: 2px;
      border-bottom: 1px solid transparent;
      transition: border-color .2s ease, color .2s ease;
    }
    .nav a:hover { color: var(--ink); border-color: var(--ink); }

    .hero {
      position: relative;
      border: 1px solid var(--line);
      border-radius: calc(var(--radius) + 10px);
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(20,16,12,.10), rgba(20,16,12,.22)),
        url('free-riders-hero-bw.png') center/cover no-repeat;
      min-height: min(84vh, 860px);
      box-shadow: var(--shadow);
      display: grid;
      align-items: end;
      margin-bottom: 28px;
    }

      content: "";
      position: absolute;
      inset: 0;
      background:
